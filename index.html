<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Tasky</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="header-top">
        <div>
          <p class="greeting">Good day 👋</p>
          <h1 class="header-title">My Tasks</h1>
        </div>
        <div class="avatar">A</div>
      </div>

      <!-- Stats row -->
      <div class="stats-row">
        <div class="stat-card">
          <span class="stat-num" id="stat-total">0</span>
          <span class="stat-label">Total</span>
        </div>
        <div class="stat-card">
          <span class="stat-num" id="stat-active">0</span>
          <span class="stat-label">Active</span>
        </div>
        <div class="stat-card">
          <span class="stat-num" id="stat-done">0</span>
          <span class="stat-label">Done</span>
        </div>
      </div>
    </header>

    <!-- Filter tabs -->
    <div class="tabs">
      <button class="tab active" data-filter="all">All</button>
      <button class="tab" data-filter="active">Active</button>
      <button class="tab" data-filter="completed">Completed</button>
    </div>

    <!-- Task list -->
    <main class="task-list" id="task-list">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">📋</div>
        <p>No tasks here!</p>
        <span>Tap + to add a new task</span>
      </div>
    </main>

    <!-- FAB -->
    <button class="fab" id="fab">+</button>

    <!-- Bottom nav -->
    <nav class="bottom-nav">
      <button class="nav-btn active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Tasks</span>
      </button>
      <button class="nav-btn" id="clear-nav-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        <span>Clear Done</span>
      </button>
    </nav>
  </div>

  <!-- Add task modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>New Task</h2>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <input type="text" id="todo-input" placeholder="What needs to be done?" autocomplete="off" />
      <div class="priority-row">
        <span class="priority-label">Priority</span>
        <div class="priority-options">
          <button class="priority-btn active" data-priority="low">Low</button>
          <button class="priority-btn" data-priority="medium">Medium</button>
          <button class="priority-btn" data-priority="high">High</button>
        </div>
      </div>
      <button class="add-btn" id="add-btn">Add Task</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
